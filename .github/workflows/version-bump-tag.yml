name: version-bump-tag

on:
  push:
    branches:
      - "main"
    paths:
      - "lumos_app/pubspec.yaml"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive tag from pubspec version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          raw="$(grep -E '^version:' lumos_app/pubspec.yaml | head -n1 | sed -E 's/^version:[[:space:]]*//')"
          if [[ -z "$raw" ]]; then
            echo "pubspec version not found" >&2
            exit 1
          fi
          semver="${raw%%+*}"
          if [[ ! "$semver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver in pubspec: '$semver'" >&2
            exit 1
          fi

          if [[ "$semver" == *-* ]]; then
            # Pre-release tags intentionally stay without "v" prefix.
            tag="${semver}"
            channel="prerelease"
          else
            # Stable tags always use "v" prefix.
            tag="v${semver}"
            channel="stable"
          fi

          echo "raw=$raw" >> "$GITHUB_OUTPUT"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: exists
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag from $GITHUB_SHA"
          git push origin "$tag"

