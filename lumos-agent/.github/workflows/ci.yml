name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - run: go test ./...
      - run: GOOS=windows GOARCH=amd64 go build -o lumos-agent-windows.exe ./cmd/agent
      - run: GOOS=linux GOARCH=amd64 go build -o lumos-agent-linux ./cmd/agent
